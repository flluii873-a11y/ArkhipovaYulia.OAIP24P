<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Логин</title>
</head>
<body>
    {% extends 'base.html' %}

{% block content %}
<h1>Вход</h1>

{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}

<p><i>(логин <b>admin</b>, пароль <b>1234)</b></i></p>

<form method="POST">
    <label>Логин:</label>
    <input type="text" name="username" required>

    <label>Пароль:</label>
    <input type="password" name="password" required>

    <button type="submit">Войти</button>
</form>
{% endblock %}


</body>
</html>
